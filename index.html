<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyFetch Weather Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🌤 SkyFetch Weather Dashboard</h1>

    <!-- Search Section -->
    <div class="search-section">
      <input type="text" id="cityInput" placeholder="Enter city name..." />
      <button id="searchBtn">Search</button>
    </div>

    <!-- Recent Searches -->
    <div class="recent-section">
      <div class="recent-header">
        <h3>Recent Searches</h3>
        <button id="clearHistory">Clear</button>
      </div>
      <div id="recentSearches" class="recent-buttons"></div>
    </div>

    <!-- Weather Display -->
    <div id="weatherContainer" class="weather-container">
      <p class="welcome">Search for a city to see weather details</p>
    </div>

    <!-- Forecast -->
    <div id="forecastContainer" class="forecast-container"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
